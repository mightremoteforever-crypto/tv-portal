<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yacht Daddy HLS Plugin</title>
<style>html,body{margin:0;background:#000;width:100%;height:100%;overflow:hidden}#v{position:fixed;top:0;left:0;width:100%;height:100%;background:#000}#d{position:fixed;top:8px;left:8px;color:#0f0;font:14px monospace;z-index:9;text-shadow:0 0 2px #000}</style>
<script src="//msx.benzac.de/js/tvx-plugin.min.js"></script>
<script src="assets/hls.min.js"></script>
</head>
<body>
<video id="v" autoplay playsinline></video>
<div id="d">init...</div>
<script>
(function () {
  var v = document.getElementById("v");
  var dbg = document.getElementById("d");
  function log(m) { dbg.textContent = m; console.log("[hls-plugin]", m); }
  function getUrl() {
    var m = location.search.match(/[?&]url=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : "";
  }
  function setup(src) {
    log("src=" + src.slice(0, 60));
    if (window.Hls && Hls.isSupported()) {
      log("hls.js path");
      var hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 30 });
      hls.loadSource(src);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, function () { log("manifest parsed, playing"); v.play(); });
      hls.on(Hls.Events.ERROR, function (e, d) {
        if (!d.fatal) return;
        log("fatal: " + d.type + "/" + d.details);
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
        else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
        else hls.destroy();
      });
      window.__hls = hls;
    } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
      log("native HLS path");
      v.src = src; v.play();
    } else {
      log("no HLS support in this browser");
    }
  }
  function wireTVX() {
    if (!window.TVXPluginTools || !window.TVXVideoPlugin) return;
    function P() {
      this.init = function () {};
      this.ready = function () { TVXVideoPlugin.startPlayback(); };
      this.play = function () { v.play(); };
      this.pause = function () { v.pause(); };
      this.stop = function () { try { v.pause(); } catch (e) {} };
      this.getDuration = function () { return isNaN(v.duration) ? 0 : v.duration; };
      this.getPosition = function () { return v.currentTime || 0; };
      this.setPosition = function (p) { v.currentTime = p; };
      this.getVolume = function () { return Math.round((v.volume || 1) * 100); };
      this.setVolume = function (x) { v.volume = x / 100; };
      this.isMuted = function () { return v.muted; };
      this.setMuted = function (m) { v.muted = m; };
      this.getSpeed = function () { return v.playbackRate || 1; };
      this.setSpeed = function (s) { v.playbackRate = s; };
      this.getUpdateData = function () {
        return { position: this.getPosition(), duration: this.getDuration(), speed: this.getSpeed() };
      };
    }
    TVXPluginTools.onReady(function () {
      TVXVideoPlugin.setupPlayer(new P());
      TVXVideoPlugin.init();
      log("MSX plugin wired");
    });
  }
  var url = getUrl();
  if (!url) { log("no ?url= param"); return; }
  setup(url);
  wireTVX();
})();
</script>
</body>
</html>
