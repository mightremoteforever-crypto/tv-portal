<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yacht Daddy — Provider Test Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#c8d6e5;font-family:monospace;padding:12px}
h1{color:#5dade2;font-size:18px;margin-bottom:4px}
.sub{color:#7f8c8d;font-size:11px;margin-bottom:16px}
#tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
#tabs button{background:#1e3a5f;border:1px solid #5dade2;color:#c8d6e5;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap}
#tabs button.on{background:#5dade2;color:#0a0e1a;font-weight:bold}
#tabs button.fail{background:#5a1a1a;border-color:#e74c3c}
#tabs button.ok{background:#1a4a1a;border-color:#2ecc71}
#frame-wrap{position:relative;width:100%;height:60vh;background:#000;border:1px solid #1e3a5f;border-radius:6px;overflow:hidden}
#frame-wrap iframe{width:100%;height:100%;border:none}
#status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#0a0e1a;z-index:10;font-size:13px}
#status .spin{width:32px;height:32px;border:3px solid #1e3a5f;border-top:3px solid #5dade2;border-radius:50%;animation:s 0.7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#status .err{color:#e74c3c;display:none;font-size:12px;text-align:center;padding:0 20px}
#info{font-size:12px;color:#7f8c8d;padding:8px 0}
#results{margin-top:12px;font-size:11px;line-height:1.6}
#results span.ok{color:#2ecc71;font-weight:bold}
#results span.fail{color:#e74c3c;font-weight:bold}
#results span.skip{color:#f39c12;font-weight:bold}
.controls{display:flex;gap:8px;margin:8px 0}
.controls button{background:#5dade2;color:#0a0e1a;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:13px}
.controls .skip{background:#f39c12}
.controls .auto{background:#2ecc71}
</style>
</head>
<body>
<h1>Provider Test Tool</h1>
<p class="sub">Opens each embed provider in an iframe. Mark working ones as OK, broken ones as FAIL.</p>
<div id="info">Select a provider below to test</div>
<div class="controls">
<button class="auto" onclick="autoTest()">Auto-Test All</button>
<button class="skip" onclick="skipProvider()">Skip</button>
<button onclick="resetTest()">Reset</button>
</div>
<div id="tabs"></div>
<div id="frame-wrap">
<div id="status"><div class="spin"></div><p>Loading...</p><div class="err" id="err">If this stays blank, the provider didn't render.</div></div>
<iframe id="f" allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
</div>
<div id="results"></div>
<script>
var providers=[
{n:"VidSrc (vidsrc.fyi)",u:"https://vidsrc.fyi/embed/movie/278"},
{n:"VidSrc (vidsrc.fyi) TV",u:"https://vidsrc.fyi/embed/tv/1399/1/1"},
{n:"VidCore (vidcore.org)",u:"https://vidcore.org/embed/movie/278?autoPlay=true"},
{n:"VixSrc (vixsrc.to)",u:"https://vixsrc.to/movie/278?autoplay=false"},
{n:"MultiEmbed (multiembed.mov)",u:"https://multiembed.mov/?video_id=278&tmdb=1"},
{n:"Cinextream (cinextream.net)",u:"https://cinextream.net/api/embed/movie/278"},
{n:"Cinextream TV",u:"https://cinextream.net/api/embed/tv/1399/1/1"},
{n:"VidZee v2 (player.vidzee.wtf)",u:"https://player.vidzee.wtf/v2/embed/movie/278"},
{n:"VidPop (vidpop.xyz)",u:"https://www.vidpop.xyz/embed/?id=278"},
{n:"VidSrcTo (vidsrc.to)",u:"https://vidsrc.to/embed/movie/278"},
{n:"VidSrcRU (vidsrc.ru)",u:"https://vidsrc.ru/embed/movie/278"},
{n:"7reels.cc (reference)",u:"https://7reels.cc/watch/278"},
];
var cur=0, done=false, timeoutId=null, results={};
var tabsEl=document.getElementById('tabs');
var frame=document.getElementById('f');
var statusEl=document.getElementById('status');
var errEl=document.getElementById('err');
var resultsEl=document.getElementById('results');

providers.forEach(function(p,i){
    var b=document.createElement('button');
    b.textContent=p.n;
    b.onclick=function(){loadProvider(i);b.className='on';};
    tabsEl.appendChild(b);
});

function loadProvider(i){
    cur=i;done=false;
    if(timeoutId)clearTimeout(timeoutId);
    statusEl.style.display='flex';
    errEl.style.display='none';
    if(results[i]!=='ok')frame.src='about:blank';
    document.querySelectorAll('#tabs button').forEach(function(x,j){x.className=j===i?'on':results[j]?results[j]:'';});
    document.getElementById('info').textContent='Testing: '+providers[i].n+' ('+providers[i].u+')';
    setTimeout(function(){
        frame.src=providers[i].u;
        timeoutId=setTimeout(function(){if(!done)showResult('fail');},10000);
    },100);
}

frame.onload=function(){
    done=true;
    if(timeoutId)clearTimeout(timeoutId);
    statusEl.style.display='none';
};

frame.onerror=function(){showResult('fail');};

function showResult(r){
    results[cur]=r;
    var b=document.querySelectorAll('#tabs button')[cur];
    b.className=r;
    updateResults();
    if(r==='fail')loadProvider((cur+1)%providers.length);
}

function markOk(){
    if(results[cur]==='ok')return;
    showResult('ok');
    loadProvider((cur+1)%providers.length);
}

function skipProvider(){
    if(timeoutId)clearTimeout(timeoutId);
    frame.src='about:blank';
    statusEl.style.display='flex';
    document.getElementById('info').textContent='Skipped: '+providers[cur].n;
    results[cur]='skip';
    var b=document.querySelectorAll('#tabs button')[cur];
    if(b)b.className='skip';
    updateResults();
    loadProvider((cur+1)%providers.length);
}

function autoTest(){
    results={};
    document.querySelectorAll('#tabs button').forEach(function(x,i){x.className='';});
    updateResults();
    loadProvider(0);
}

function resetTest(){
    results={};
    document.querySelectorAll('#tabs button').forEach(function(x,i){x.className='';});
    updateResults();
    document.getElementById('info').textContent='Reset. Select a provider to test.';
}

function updateResults(){
    var html='';
    var ok=0,fail=0,skip=0;
    providers.forEach(function(p,i){
        var r=results[i]||'';
        if(r==='ok'){ok++;html+='<span class="ok">OK</span> ';}
        else if(r==='fail'){fail++;html+='<span class="fail">FAIL</span> ';}
        else if(r==='skip'){skip++;html+='<span class="skip">SKIP</span> ';}
        else html+='<span style="color:#555">—</span> ';
        html+=p.n+'<br>';
    });
    html+='<br><b>'+ok+' OK</b> | '+fail+' FAIL | '+skip+' skipped | '+providers.length+' total';
    resultsEl.innerHTML=html;
}

// Keyboard nav
document.addEventListener('keydown',function(e){
    if(e.key==='Enter')markOk();
    if(e.key==='ArrowRight'||e.key==='ArrowLeft'||e.key===' ')skipProvider();
});
</script>
</body>
</html>
