<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#000}
#v{width:100%;height:100%;border:none;display:block}</style>
</head><body>
<iframe id="v" allowfullscreen></iframe>
<script>
var r=location.search.match(/[?&]tmdb=([^&]*)/),t=(r&&r[1])||'278';
var p=[
{u:'https://vidsrc.fyi/embed/movie/'+t, n:'VidSrc'},
{u:'https://vidsrc.me/embed/movie/'+t, n:'VidSrc2'},
{u:'https://multiembed.mov/?video_id='+t+'&tmdb=1', n:'Multi'},
{u:'https://vidcore.org/embed/movie/'+t, n:'Core'}
];
var i=0,d=false,s=null;
function l(){d=false;var v=document.getElementById('v');try{v.src='about:blank';}catch(e){}v.src=p[i].u;if(s)clearTimeout(s);s=setTimeout(function(){if(!d&&i<p.length-1){i++;l();}else if(!d){i=0;l();}},12000);}
document.getElementById('v').onload=function(){d=true;if(s)clearTimeout(s);};
document.getElementById('v').onerror=function(){if(!d&&i<p.length-1){i++;l();}};
l();
</script>
</body></html>
