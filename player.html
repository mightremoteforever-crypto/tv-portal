<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yacht Daddy Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; }
#f { position:absolute; inset:0; width:100%; height:100%; border:none; }
</style>
</head>
<body>
<iframe id="f" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
<script>
(function(){
  var r=location.search.match(/[?&]tmdb=([^&]*)/);
  var tmdb=(r&&r[1])||'278';
  var u='https://vaplayer.ru/embed/movie/'+tmdb+'?autoplay=1';
  document.getElementById('f').src=u;
})();
</script>
</body>
