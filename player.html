<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>YD Player</title>
<style>
*,*:before,*:after{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;padding:0;background:#000;overflow:hidden;font-family:Arial,Helvetica,sans-serif;font-size:22px}
#v,#native{width:100%;height:100%;border:none;display:block;position:absolute;top:0;left:0;background:#000}
#native{display:none;z-index:2}
#v{z-index:1}
#st{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9996;color:#fff;font:600 26px/1.4 Arial,sans-serif;text-align:center;text-shadow:0 2px 6px #000;pointer-events:none;display:none;padding:0 30px;max-width:92%}
/* big direct-mode control bar (bottom centre) */
#bar{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);z-index:9997;display:none;gap:18px}
.ctrl{background:rgba(0,0,0,0.72);color:#fff;border:3px solid rgba(255,255,255,0.4);border-radius:18px;min-width:120px;min-height:100px;font:700 30px/1 Arial,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 14px}
.ctrl:active{background:rgba(43,168,184,0.55)}
/* top-right controls: NEXT source + SOURCES */
#topbar{position:fixed;top:20px;right:20px;z-index:9997;display:flex;gap:14px;align-items:center}
#nextBtn{background:rgba(0,0,0,0.8);color:#1C6EA4;border:3px solid #1C6EA4;border-radius:12px;font:700 28px/1 Arial,sans-serif;padding:18px 28px;min-height:68px;cursor:pointer}
#nextBtn:active{background:rgba(28,110,164,0.4)}
#srcBtn{background:rgba(0,0,0,0.8);color:#2BA8B8;border:3px solid #2BA8B8;border-radius:12px;font:700 28px/1 Arial,sans-serif;padding:18px 28px;min-height:68px;cursor:pointer}
#srcBtn:active{background:rgba(43,168,184,0.4)}
/* SOURCES drawer — hidden until tapped */
#drawer{position:fixed;top:0;right:0;height:100%;width:min(48%,780px);background:rgba(7,17,27,0.97);border-left:4px solid #2BA8B8;z-index:9998;transform:translateX(100%);transition:transform .18s ease;display:flex;flex-direction:column;padding:24px}
#drawer.open{transform:translateX(0)}
#drawerHead{display:flex;align-items:center;justify-content:space-between;color:#2BA8B8;font:700 36px/1 Arial,sans-serif;margin-bottom:20px}
#drawerClose{background:rgba(0,0,0,0.6);color:#fff;border:3px solid rgba(255,255,255,0.4);border-radius:12px;font:700 32px/1 Arial,sans-serif;min-width:72px;min-height:72px;cursor:pointer}
#s{overflow-y:auto;flex:1;padding-right:8px}
.src{display:flex;align-items:center;gap:20px;width:100%;min-height:80px;background:rgba(0,0,0,0.5);color:#fff;border:3px solid rgba(255,255,255,0.25);border-radius:12px;font:600 28px/1.1 Arial,sans-serif;padding:16px 22px;margin-bottom:16px;cursor:pointer;text-align:left}
.src.a{border-color:#2BA8B8;color:#2BA8B8;background:rgba(43,168,184,0.16)}
.src.sel{box-shadow:0 0 0 5px #C9A24B inset}
.dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:inline-block}
.dot-works{background:#39d98a}
.dot-maybe{background:#E9C46A}
.dot-blocked,.dot-down{background:#E76F51}
#tap{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9996;background:rgba(0,0,0,0.8);color:#fff;font:400 22px/1.3 Arial,sans-serif;padding:14px 22px;border-radius:10px;border:2px solid rgba(255,255,255,0.25);text-align:center;max-width:94%;display:none;pointer-events:none}
</style>
</head><body>
<div id="st"></div>
<div id="bar">
  <button id="bBack10" class="ctrl" title="Back 10 seconds">-10s</button>
  <button id="bPlay" class="ctrl" title="Play / Pause">PLAY/PAUSE</button>
  <button id="bFwd10" class="ctrl" title="Forward 10 seconds">+10s</button>
  <button id="bMute" class="ctrl" title="Mute / Unmute">MUTE</button>
</div>
<div id="topbar">
  <button id="nextBtn" title="Try next source">NEXT &#9656;</button>
  <button id="srcBtn" title="Choose source">SOURCES</button>
</div>
<div id="drawer">
  <div id="drawerHead"><span>SOURCES</span><button id="drawerClose" title="Close">X</button></div>
  <div id="s"></div>
</div>
<video id="native" playsinline></video>
<iframe id="v" title="Video Player" allow="encrypted-media; fullscreen *; autoplay *; picture-in-picture *" allowfullscreen></iframe>
<div id="tap"></div>
<script src="assets/hls.min.js"></script>
<script>
 (function() {
  var r=location.search.match(/[?&]tmdb=([^&]*)/),t=(r&&r[1])||'278';
  var rs=location.search.match(/[?&]s=([^&]*)/),ss=(rs&&rs[1])||'';
  var re=location.search.match(/[?&]e=([^&]*)/),se=(re&&re[1])||'';
  var isTV=!!(ss&&se);
  var v=document.getElementById('v');
  var nv=document.getElementById('native');
  var st=document.getElementById('st');
  var tap=document.getElementById('tap');
  var bar=document.getElementById('bar');
  var srcBtn=document.getElementById('srcBtn');
  var nextBtn=document.getElementById('nextBtn');
  var drawer=document.getElementById('drawer');
  var sEl=document.getElementById('s');
  var bPlay=document.getElementById('bPlay');
  var bMute=document.getElementById('bMute');
  var bBack10=document.getElementById('bBack10');
  var bFwd10=document.getElementById('bFwd10');
  var dClose=document.getElementById('drawerClose');
  var loaded=false,hls=null,mode='embed',timers=[],drawerOpen=false,selIdx=-1;

  function setStatus(m,s){if(!st)return;st.textContent=m||'';st.style.display=s?'block':'none';}
  function clearTimers(){for(var j=0;j<timers.length;j++)clearTimeout(timers[j]);timers=[];}
  function hideTap(){if(tap)tap.style.display='none';}
  function stopHls(){if(hls){try{hls.destroy();}catch(e){}hls=null;}}

  var providers=[
{key:'multiembed',n:'MultiEmbed',m:'https://multiembed.mov/?video_id='+t+'&tmdb=1',tv:'https://multiembed.mov/?video_id='+t+'&tmdb=1&s='+ss+'&e='+se+'',mode:'embed',cls:'works'},
{key:'cinextream',n:'Cinextream',m:'https://cinextream.net/api/embed/movie/'+t+'',tv:'https://cinextream.net/api/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'works'},
{key:'videasy',n:'VidEasy',m:'https://player.videasy.net/movie/'+t+'',tv:'https://player.videasy.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidup',n:'VidUp',m:'https://vidup.to/movie/'+t+'',tv:'https://vidup.to/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidcore7',n:'VidCore7',m:'https://vidcore.net/movie/'+t+'',tv:'https://vidcore.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidsrcmov',n:'VidSrcMov',m:'https://vidsrc.mov/embed/movie/'+t+'',tv:'https://vidsrc.mov/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'adrock',n:'AdRock',m:'https://vidrock.net/movie/'+t+'',tv:'https://vidrock.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidnest',n:'VidNest',m:'https://vidnest.fun/movie/'+t+'',tv:'https://vidnest.fun/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidlink',n:'VidLink',m:'https://vidlink.pro/movie/'+t+'',tv:'https://vidlink.pro/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'vidzee',n:'Vidzee',m:'https://player.vidzee.wtf/embed/movie/'+t+'',tv:'https://player.vidzee.wtf/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'maybe'},
{key:'strigil',n:'Strigil',m:'https://strigil.cc/embed/movie/'+t+'?embedKey=key_c90081fa77254eb5',tv:'https://strigil.cc/embed/tv/'+t+'/'+ss+'/'+se+'?embedKey=key_c90081fa77254eb5',mode:'embed',cls:'maybe'},
{key:'vidsrcru',n:'VidSrcRU',m:'https://vidsrc.ru/embed/movie/'+t+'',tv:'https://vidsrc.ru/embed/tv/'+t+'',mode:'embed',cls:'maybe'},
{key:'vidsrcto',n:'VidSrcTo',m:'https://vidsrc.to/embed/movie/'+t+'',tv:'https://vidsrc.to/embed/tv/'+t+'',mode:'embed',cls:'blocked'},
{key:'vidplus',n:'VidPlus',m:'https://player.vidplus.to/embed/movie/'+t+'',tv:'https://player.vidplus.to/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'down'},
{key:'vidify',n:'Vidify',m:'https://player.vidify.top/embed/movie/'+t+'',tv:'https://player.vidify.top/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'down'},
{key:'vidsuper',n:'VidSuper',m:'https://vidsuper.net/movie/'+t+'',tv:'https://vidsuper.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed',cls:'down'},
{key:'demo',n:'Demo (test)',mode:'direct',cls:'works',src:'https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8'}
];
  function idx(k){for(var j=0;j<providers.length;j++){if(providers[j].key===k)return j;}return -1;}
  function pby(k){var i=idx(k);return i>=0?providers[i]:null;}
  function url(p){return isTV?(p.tv||p.m):p.m;}
  function isSkippable(p){return p&&(p.cls==='blocked'||p.cls==='down');}

  var saved=null;try{saved=localStorage.getItem('yd-player');}catch(e){}
  var cur=(saved&&idx(saved)>=0)?saved:(idx('multiembed')>=0?'multiembed':(providers[0]?providers[0].key:null));

  var btnEls={};
  function buildButtons(){if(!sEl||Object.keys(btnEls).length)return;
   for(var j=0;j<providers.length;j++){var p=providers[j];var b=document.createElement('button');b.className='src';
     var dot=document.createElement('span');dot.className='dot dot-'+p.cls;
     var lab=document.createElement('span');lab.className='lbl';lab.textContent=p.n+(p.mode==='direct'?' •':'');
     b.appendChild(dot);b.appendChild(lab);
     b.onclick=(function(k){return function(){closeDrawer();if(k!==cur)load(k);};})(p.key);
     sEl.appendChild(b);btnEls[p.key]=b;}
   markActive();}
  function markActive(){for(var k in btnEls){btnEls[k].className='src'+(k===cur?' a':'');}}

  function openDrawer(){drawerOpen=true;drawer.className='open';var i=idx(cur);selIdx=(i>=0)?i:0;highlight();}
  function closeDrawer(){drawerOpen=false;drawer.className='';}
  function toggleDrawer(){if(drawerOpen)closeDrawer();else openDrawer();}
  function highlight(){for(var j=0;j<providers.length;j++){var b=btnEls[providers[j].key];if(b)b.classList.toggle('sel',j===selIdx);}}
  function moveSel(d){if(!drawerOpen)return;selIdx+=d;if(selIdx<0)selIdx=0;if(selIdx>providers.length-1)selIdx=providers.length-1;highlight();var b=btnEls[providers[selIdx].key];if(b)b.scrollIntoView({block:'nearest'});}
  function chooseSel(){if(!drawerOpen||selIdx<0)return;var k=providers[selIdx].key;closeDrawer();if(k!==cur)load(k);}

  function capHeight(hls){
    try{var lv=hls.levels||[];var best=-1,bestH=1e9;
      for(var i=0;i<lv.length;i++){var h=lv[i].height||0;if(!h)continue;
        if(h<=720){if(best<0||h>lv[best].height)best=i;}
        if(h<bestH)bestH=h;}
      if(best<0&&lv.length)best=bestH;
      if(best>=0)hls.autoLevelCapping=best;
    }catch(e){}
  }
  function pickEnglish(hls){
    try{var tr=hls.audioTracks||[];
      for(var i=0;i<tr.length;i++){var n=(tr[i].name||tr[i].lang||'').toLowerCase();if(/en|english/.test(n)){hls.audioTrack=i;return;}}
    }catch(e){}
  }

  function showDirectControls(on){if(bar)bar.style.display=on?'flex':'none';}
  function playDirect(src){
    setStatus('Loading direct stream ...',true);
    if(window.Hls&&Hls.isSupported()){
      hls=new Hls({enableWorker:true,lowLatencyMode:false,backBufferLength:30,capLevelToPlayerSize:false});
      hls.loadSource(src);hls.attachMedia(nv);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){capHeight(hls);pickEnglish(hls);setStatus('',false);nv.play().catch(function(){});});
      hls.on(Hls.Events.ERROR,function(e,d){if(!d.fatal)return;setStatus('Stream error: '+d.details,true);if(d.type===Hls.ErrorTypes.NETWORK_ERROR)hls.startLoad();else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hls.recoverMediaError();else stopHls();});
    } else if(nv.canPlayType('application/vnd.apple.mpegurl')){
      nv.src=src;setStatus('',false);nv.play().catch(function(){});
    } else {
      nv.src=src;setStatus('This browser cannot play HLS directly',true);
    }
  }

  function load(key){
    if(key)cur=key;try{localStorage.setItem('yd-player',cur);}catch(e){}
    var p=pby(cur);if(!p){setStatus('No provider',true);return;}
    markActive();clearTimers();stopHls();hideTap();
    if(nv){try{nv.pause();nv.removeAttribute('src');}catch(e){}}
    if(p.mode==='direct'){
      mode='direct';showDirectControls(true);
      try{v.src='about:blank';}catch(e){}
      v.style.display='none';nv.style.display='block';
      playDirect(p.src);
    } else {
      mode='embed';showDirectControls(false);
      nv.style.display='none';v.style.display='block';
      loaded=false;setStatus('Loading '+(p.n||'')+' ...',true);
      try{v.src='about:blank';}catch(e){}
      v.src=url(p);
      timers.push(setTimeout(function(){if(!loaded){setStatus(p.n+': no response — press SOURCES (top-right) -> Next',true);}},15000));
    }
  }

  function next(){var ci=idx(cur);
    if(ci>=0){var ni=ci+1;while(ni<providers.length&&isSkippable(providers[ni]))ni++;
      if(ni<providers.length){load(providers[ni].key);return;}}
    setStatus('All providers tried',true);
    cur=(idx('multiembed')>=0?'multiembed':(providers[0]?providers[0].key:null));
    clearTimers();timers.push(setTimeout(load,2000));}

  v.onload=function(){loaded=true;clearTimers();
    if(mode==='embed'){var p=pby(cur);setStatus(p?(p.n+': playing - use the video controls. Stuck? SOURCES -> Next'):'',true);
      if(tap){tap.textContent='If it stays on "please wait", press SOURCES (top-right) and pick another source';tap.style.display='block';}}
    else setStatus('',false);};
  v.onerror=function(){setStatus(cur+': error',true);};

  window.addEventListener('message',function(e){var d=e.data;if(!d||typeof d!=='object')return;
   if(/fullscreen/i.test((d.type||'')+'|'+(d.name||'')+'|'+(d.command||''))){var el=(mode==='direct')?nv:v;if(document.fullscreenElement||document.webkitFullscreenElement){if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}else{if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}}
  });

  if(bPlay)bPlay.onclick=function(){if(nv.paused)nv.play().catch(function(){});else nv.pause();};
  if(bMute)bMute.onclick=function(){nv.muted=!nv.muted;bMute.textContent=nv.muted?'\uD83D\uDD07':'\uD83D\uDD0A';};
  if(bBack10)bBack10.onclick=function(){nv.currentTime=Math.max(0,(nv.currentTime||0)-10);};
  if(bFwd10)bFwd10.onclick=function(){nv.currentTime=(nv.currentTime||0)+10;};
  if(srcBtn)srcBtn.onclick=toggleDrawer;
  if(nextBtn)nextBtn.onclick=next;
  if(dClose)dClose.onclick=closeDrawer;

  document.addEventListener('keydown',function(e){
    if(drawerOpen){
      if(e.key==='ArrowDown'){e.preventDefault();moveSel(1);}
      else if(e.key==='ArrowUp'){e.preventDefault();moveSel(-1);}
      else if(e.key==='Enter'){e.preventDefault();chooseSel();}
      else if(e.key==='Escape'){e.preventDefault();closeDrawer();}
      return;
    }
    if(e.key==='s'||e.key==='S'){toggleDrawer();}
    else if(mode==='direct'){
      if(e.key===' '){e.preventDefault();if(nv.paused)nv.play().catch(function(){});else nv.pause();}
      else if(e.key==='m'||e.key==='M'){nv.muted=!nv.muted;}
    }
  });

  buildButtons();
  load();
  })();
</script>
</body></html>
