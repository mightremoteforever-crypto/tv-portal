<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>YD Player</title>
<style>
*,*:before,*:after{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;padding:0;background:#000;overflow:hidden}
#v,#native{width:100%;height:100%;border:none;display:block;position:absolute;top:0;left:0;background:#000}
#native{display:none;z-index:2}
#v{z-index:1}
#tap{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:9996;background:rgba(0,0,0,0.72);color:#fff;font:400 13px/1.3 Arial,sans-serif;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.25);text-align:center;max-width:90%;display:none;pointer-events:none}
#vol{position:fixed;bottom:16px;right:16px;z-index:9997;background:rgba(0,0,0,0.7);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:8px 14px;font-size:13px;cursor:pointer;border-radius:6px;display:none}
#s{position:fixed;top:10px;right:10px;z-index:9997;max-height:60vh;overflow-y:auto}
#s button{display:block;width:100%;background:rgba(0,0,0,0.7);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:4px 10px;font-size:10px;cursor:pointer;text-align:left;margin-bottom:4px}
#s button.a{border-color:#2BA8B8;color:#2BA8B8;font-weight:700}
#st{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9996;color:#fff;font:600 17px/1.5 Arial,sans-serif;text-align:center;text-shadow:0 1px 4px #000;pointer-events:none;display:none;padding:0 20px}
</style>
</head><body>
<div id="st"></div>
<button id="vol" title="Mute / unmute">VOL</button>
<video id="native" controls playsinline></video>
<iframe id="v" title="Video Player" allow="encrypted-media; fullscreen *; autoplay *; picture-in-picture *" allowfullscreen></iframe>
<div id="tap"></div>
<div id="s"></div>
<script src="assets/hls.min.js"></script>
<script>
 (function() {
  var r=location.search.match(/[?&]tmdb=([^&]*)/),t=(r&&r[1])||'278';
  var rs=location.search.match(/[?&]s=([^&]*)/),ss=(rs&&rs[1])||'';
  var re=location.search.match(/[?&]e=([^&]*)/),se=(re&&re[1])||'';
  var isTV=!!(ss&&se);
  var v=document.getElementById('v');
  var nv=document.getElementById('native');
  var st=document.getElementById('st');
  var tap=document.getElementById('tap');
  var vol=document.getElementById('vol');
  var loaded=false,hls=null,mode='embed',timers=[];

  function setStatus(m,s){if(!st)return;st.textContent=m||'';st.style.display=s?'block':'none';}
  function clearTimers(){for(var j=0;j<timers.length;j++)clearTimeout(timers[j]);timers=[];}
  function hideTap(){if(tap)tap.style.display='none';}
  function stopHls(){if(hls){try{hls.destroy();}catch(e){}hls=null;}}

  var providers=[
{key:'videasy',n:'VidEasy',m:'https://player.videasy.net/movie/'+t+'',tv:'https://player.videasy.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidup',n:'VidUp',m:'https://vidup.to/movie/'+t+'',tv:'https://vidup.to/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidcore7',n:'VidCore7',m:'https://vidcore.net/movie/'+t+'',tv:'https://vidcore.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidplus',n:'VidPlus',m:'https://player.vidplus.to/embed/movie/'+t+'',tv:'https://player.vidplus.to/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidsrcmov',n:'VidSrcMov',m:'https://vidsrc.mov/embed/movie/'+t+'',tv:'https://vidsrc.mov/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'adrock',n:'AdRock',m:'https://vidrock.net/movie/'+t+'',tv:'https://vidrock.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidnest',n:'VidNest',m:'https://vidnest.fun/movie/'+t+'',tv:'https://vidnest.fun/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidlink',n:'VidLink',m:'https://vidlink.pro/movie/'+t+'',tv:'https://vidlink.pro/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidify',n:'Vidify',m:'https://player.vidify.top/embed/movie/'+t+'',tv:'https://player.vidify.top/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidzee',n:'Vidzee',m:'https://player.vidzee.wtf/embed/movie/'+t+'',tv:'https://player.vidzee.wtf/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidsuper',n:'VidSuper',m:'https://vidsuper.net/movie/'+t+'',tv:'https://vidsuper.net/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'strigil',n:'Strigil',m:'https://strigil.cc/embed/movie/'+t+'?embedKey=key_c90081fa77254eb5',tv:'https://strigil.cc/embed/tv/'+t+'/'+ss+'/'+se+'?embedKey=key_c90081fa77254eb5',mode:'embed'},
{key:'vidsrcto',n:'VidSrcTo',m:'https://vidsrc.to/embed/movie/'+t+'',tv:'https://vidsrc.to/embed/tv/'+t+'',mode:'embed'},
{key:'cinextream',n:'Cinextream',m:'https://cinextream.net/api/embed/movie/'+t+'',tv:'https://cinextream.net/api/embed/tv/'+t+'/'+ss+'/'+se+'',mode:'embed'},
{key:'vidsrcru',n:'VidSrcRU',m:'https://vidsrc.ru/embed/movie/'+t+'',tv:'https://vidsrc.ru/embed/tv/'+t+'',mode:'embed'},
{key:'multiembed',n:'MultiEmbed',m:'https://multiembed.mov/?video_id='+t+'&tmdb=1',tv:'https://multiembed.mov/?video_id='+t+'&tmdb=1&s='+ss+'&e='+se+'',mode:'embed'},
{key:'demo',n:'Demo (test)',mode:'direct',src:'https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8'}
];
  function idx(k){for(var j=0;j<providers.length;j++){if(providers[j].key===k)return j;}return -1;}
  function pby(k){var i=idx(k);return i>=0?providers[i]:null;}
  function url(p){return isTV?(p.tv||p.m):p.m;}

  var saved=null;try{saved=localStorage.getItem('yd-player');}catch(e){}
  var cur=(saved&&idx(saved)>=0)?saved:(providers[0]?providers[0].key:null);

  var btnEls={};
  function buildButtons(){var s=document.getElementById('s');if(!s||Object.keys(btnEls).length)return;
   for(var j=0;j<providers.length;j++){var p=providers[j];var b=document.createElement('button');b.textContent=p.n+(p.mode==='direct'?' •':'');b.onclick=(function(k){return function(){if(k!==cur)load(k);};})(p.key);s.appendChild(b);btnEls[p.key]=b;}
   markActive();}
  function markActive(){for(var k in btnEls){btnEls[k].className=(k===cur)?'a':'';}}

  function playDirect(src){
    setStatus('Loading direct stream ...',true);
    if(window.Hls&&Hls.isSupported()){
      hls=new Hls({enableWorker:true,lowLatencyMode:false,backBufferLength:30});
      hls.loadSource(src);hls.attachMedia(nv);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){setStatus('',false);nv.play().catch(function(){});});
      hls.on(Hls.Events.ERROR,function(e,d){if(!d.fatal)return;setStatus('Stream error: '+d.details,true);if(d.type===Hls.ErrorTypes.NETWORK_ERROR)hls.startLoad();else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hls.recoverMediaError();else stopHls();});
    } else if(nv.canPlayType('application/vnd.apple.mpegurl')){
      nv.src=src;setStatus('',false);nv.play().catch(function(){});
    } else {
      nv.src=src;setStatus('This browser cannot play HLS directly',true);
    }
  }

  function load(key){
    if(key)cur=key;try{localStorage.setItem('yd-player',cur);}catch(e){}
    var p=pby(cur);if(!p){setStatus('No provider',true);return;}
    markActive();clearTimers();stopHls();hideTap();
    if(p.mode==='direct'){
      mode='direct';
      try{v.src='about:blank';}catch(e){}
      v.style.display='none';nv.style.display='block';
      playDirect(p.src);
    } else {
      mode='embed';
      nv.style.display='none';v.style.display='block';
      loaded=false;setStatus('Loading '+(p.n||'')+' ...',true);
      try{v.src='about:blank';}catch(e){}
      v.src=url(p);
      timers.push(setTimeout(function(){if(!loaded){setStatus(p.n+': no response — TV browser may block this embed',true);}},15000));
    }
  }

  function next(){var ci=idx(cur);if(ci>=0&&ci<providers.length-1){load(providers[ci+1].key);}else{setStatus('All providers tried',true);cur=providers[0]?providers[0].key:null;clearTimers();timers.push(setTimeout(load,2000));}}

  v.onload=function(){loaded=true;clearTimers();setStatus('',false);
    if(mode==='embed'&&tap){tap.textContent='If it stays on “please wait”, press OK / tap the video';tap.style.display='block';}};
  v.onerror=function(){setStatus(cur+': error',true);};

  window.addEventListener('message',function(e){var d=e.data;if(!d||typeof d!=='object')return;
   if(/fullscreen/i.test((d.type||'')+'|'+(d.name||'')+'|'+(d.command||''))){var el=(mode==='direct')?nv:v;if(document.fullscreenElement||document.webkitFullscreenElement){if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}else{if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}}
  });

  if(vol){vol.style.display='block';vol.onclick=function(){if(mode==='direct'){nv.muted=!nv.muted;}else{try{v.contentWindow.postMessage({command:'muteAndPlay'},'*');}catch(e){}}};}

  buildButtons();
  load();
  })();
</script>
</body></html>
