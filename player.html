<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
html,body{width:100%;height:100%;margin:0;padding:0;background:#000;overflow:hidden}
#v{width:100%;height:100%;border:none;display:block}
#d{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-size:11px;font-family:monospace;padding:6px 10px;z-index:9999;max-height:40vh;overflow-y:auto;pointer-events:none}
#d .err{color:#f44} #d .ok{color:#0f0} #d .skip{color:#fa0}
</style>
</head><body>
<div id="d"><div class="ok">YD Player v5.7</div></div>
<iframe id="v" allowfullscreen></iframe>
<script>
var r=location.search.match(/[?&]tmdb=([^&]*)/),t=(r&&r[1])||'278';
var log=document.getElementById('d');
function L(m,c){var e=document.createElement('div');if(c)e.className=c;e.textContent=new Date().toISOString().slice(11,19)+' '+m;log.insertBefore(e,log.firstChild||null);}

var p=[
{u:'https://vidsrc.fyi/embed/movie/'+t,n:'VidSrc'},
{u:'https://multiembed.mov/?video_id='+t+'&tmdb=1',n:'MultiEmbed'},
{u:'https://embed.su/embed/movie/'+t,n:'EmbedSU'},
{u:'https://vidsrc.to/embed/movie/'+t,n:'VidSrcTo'},
{u:'https://vidsrc.ru/embed/movie/'+t,n:'VidSrcRU'},
{u:'https://vidcore.org/embed/movie/'+t,n:'VidCore'},
];
var i=0,d=false,s=null,v=document.getElementById('v');

function load(){d=false;L('Trying '+p[i].n+'...');
  try{v.src='about:blank';}catch(e){}
  v.src=p[i].u;
  if(s)clearTimeout(s);
  s=setTimeout(function(){if(!d){L('Timeout '+p[i].n,'err');if(i<p.length-1){i++;load();}else{L('ALL FAILED - restarting','err');i=0;setTimeout(load,2000);}}else L('Loaded '+p[i].n+' (video stream may take time)','ok');},15000);
}

v.onload=function(){d=true;if(s)clearTimeout(s);L('Page loaded: '+p[i].n,'ok');};
v.onerror=function(){L('Error loading: '+p[i].n,'err');if(i<p.length-1){i++;load();}else{L('ALL FAILED','err');i=0;setTimeout(load,2000);}};

load();
</script>
</body></html>
