<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>YD Player</title>
<style>
*,*:before,*:after{{box-sizing:border-box}}
html,body{{width:100%;height:100%;margin:0;padding:0;background:#000;overflow:hidden}}
#v{{width:100%;height:100%;border:none;display:block}}
#o{{position:fixed;top:0;left:0;right:0;bottom:0;display:none;background:rgba(0,0,0,0.85);z-index:9998;cursor:pointer}}
#o .b{{background:#fff;color:#000;font:600 14px/1 Arial,sans-serif;padding:10px 20px;border-radius:999px;border:none;cursor:pointer}}
#o .t{{color:#fff;font:400 13px/1.4 Arial,sans-serif;margin-bottom:10px;text-align:center}}
#d{{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-size:11px;font-family:monospace;padding:6px 10px;z-index:9999;max-height:40vh;overflow-y:auto;pointer-events:none}}
#d .err{{color:#f44}} #d .ok{{color:#0f0}} #d .skip{{color:#fa0}}
#s{{position:fixed;top:10px;right:10px;z-index:9997;max-height:60vh;overflow-y:auto}}
#s button{{display:block;width:100%;background:rgba(0,0,0,0.7);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:4px 10px;font-size:10px;cursor:pointer;text-align:left;margin-bottom:4px}}
#s button.a{{border-color:#16a085;color:#16a085;font-weight:700}}
</style>
</head><body>
<div id="d"><div class="ok">YD Player v6.0</div></div>
<iframe id="v" allowfullscreen></iframe>
<div id="o"><div><div class="t">Autoplay blocked</div><button class="b" onclick="startPlay()">Start playback</button></div></div>
<div id="s"></div>
<script>
(function() {
var r=location.search.match(/[?&]tmdb=([^&]*)/),t=(r&&r[1])||'278';
var rs=location.search.match(/[?&]s=([^&]*)/),ss=(rs&&rs[1])||'';
var re=location.search.match(/[?&]e=([^&]*)/),se=(re&&re[1])||'';
var isTV=!!(ss&&se);
var log=document.getElementById('d');
var v=document.getElementById('v');
var o=document.getElementById('o');
var loaded=false,retries=0;
var providers=[
{key:'videasy',n:'VidEasy',m:'https://player.videasy.net/movie/'+t+'',tv:'https://player.videasy.net/tv/'+t+'/'+ss+'/'+se+'?nextEpisode=true&autoplayNextEpisode=true&episodeSelector=true&overlay=true&color=16A085'},
{key:'vidfast',n:'VidUp',m:'https://vidup.to/movie/'+t+'',tv:'https://vidup.to/tv/'+t+'/'+ss+'/'+se+'?autoPlay=true&theme=16A085&nextButton=true&autoNext=true&sub=en'},
{key:'vidcore',n:'VidCore',m:'https://vidcore.net/movie/'+t+'',tv:'https://vidcore.net/tv/'+t+'/'+ss+'/'+se+'?autoPlay=true&sub=en'},
{key:'vidplus',n:'VidPlus',m:'https://player.vidplus.to/embed/movie/'+t+'',tv:'https://player.vidplus.to/embed/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidsrc0',n:'Vidsrc0',m:'https://vidsrc.mov/embed/movie/'+t+'',tv:'https://vidsrc.mov/embed/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidrock',n:'AdRock',m:'https://vidrock.net/movie/'+t+'',tv:'https://vidrock.net/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidnest',n:'VidNest',m:'https://vidnest.fun/movie/'+t+'',tv:'https://vidnest.fun/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidlink',n:'VidLink',m:'https://vidlink.pro/movie/'+t+'',tv:'https://vidlink.pro/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidify',n:'Vidify',m:'https://player.vidify.top/embed/movie/'+t+'',tv:'https://player.vidify.top/embed/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidzee',n:'Vidzee',m:'https://player.vidzee.wtf/embed/movie/'+t+'',tv:'https://player.vidzee.wtf/embed/tv/'+t+'/'+ss+'/'+se+''},
{key:'vidsuper',n:'VidSuper',m:'https://vidsuper.net/movie/'+t+'',tv:'https://vidsuper.net/tv/'+t+'/'+ss+'/'+se+'?nextEpisode=true&autoplayNextEpisode=true&episodeSelector=true&overlay=true&skip_intro=true&color=16A085'},
{key:'strigil',n:'Strigil',m:'https://strigil.cc/embed/movie/'+t+'?embedKey=key_c90081fa77254eb5&autoPlay=true&theme=16A085&sub=en',tv:'https://strigil.cc/embed/tv/'+t+'/'+ss+'/'+se+'?embedKey=key_c90081fa77254eb5&autoPlay=true&theme=16A085&sub=en'}
];
var saved=null;
try{{saved=localStorage.getItem('yd-player');}}catch(e){{}}
var cur=saved;if(!cur)cur=providers[0]?providers[0].key:null;
var timers=[];

function idx(key){{for(var j=0;j<providers.length;j++){{if(providers[j].key===key)return j;}}return -1;}}
function pby(key){{for(var j=0;j<providers.length;j++){{if(providers[j].key===key)return providers[j];}}return null;}}

function L(m,c){{var e=document.createElement('div');if(c)e.className=c;var d=new Date();e.textContent=d.getHours()+':'+d.getMinutes()+':'+d.getSeconds()+' '+m;log.insertBefore(e,log.firstChild||null);}}

function url(p){{return isTV?(p.tv||p.m):p.m;}}

function load(key){{if(key)cur=key;try{{localStorage.setItem('yd-player',cur);}}catch(e){{}}
 loaded=false;retries=0;o.style.display='none';
  try{{v.src='about:blank';}}catch(e){{}}
  var p=pby(cur);
  if(!p){{L('No provider','err');return;}}
  L('Trying '+p.n+'...');
  v.src=url(p);
  renderButtons();
  for(var j=0;j<timers.length;j++){{clearTimeout(timers[j]);}}timers=[];
  timers.push(setTimeout(function(){{if(!loaded){{L('Timeout '+p.n,'err');next();}}else L('Loaded '+p.n+' (stream may take time)','ok');}},15000));
}}

function next(){{var ci=idx(cur);if(ci>=0&&ci<providers.length-1){{load(providers[ci+1].key);}}else{{L('ALL FAILED - restarting','err');cur=providers[0]?providers[0].key:null;setTimeout(function(){{load();}},2000);}}}}

function startPlay(){{retries=0;o.style.display='none';attemptPlay();}}

function attemptPlay(){{if(retries>=4)return;try{{v.contentWindow.postMessage({{command:'muteAndPlay'}},'*');}}catch(e){{}}retries++;if(retries<4){{timers.push(setTimeout(attemptPlay,600));}}}}

v.onload=function(){{loaded=true;for(var j=0;j<timers.length;j++){{clearTimeout(timers[j]);}}timers=[];L('Page loaded: '+cur,'ok');o.style.display='none';attemptPlay();}};
v.onerror=function(){{L('Error: '+cur,'err');next();}};

window.addEventListener('message',function(e){{var d=e.data;if(!d||typeof d!=='object')return;
 if(d.type==='PLAYER_EVENT'&&d.data&&d.data.event){{}}
 if(d.type==='MEDIA_DATA'&&d.data){{}}
 if(/fullscreen/i.test((d.type||'')+'|'+(d.name||'')+'|'+(d.command||''))){{var el=v;if(document.fullscreenElement||document.webkitFullscreenElement){{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}else{{if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}}}}
}});

function renderButtons(){{var s=document.getElementById('s');s.innerHTML='';
 for(var j=0;j<providers.length;j++){{var p=providers[j];var b=document.createElement('button');b.textContent=p.n+(p.key===cur?' ▸':'');if(p.key===cur)b.className='a';
  b.onclick=function(){{if(p.key!==cur)load(p.key);}};s.appendChild(b);}}}}

renderButtons();
load();
}})();</body></html>
