<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yacht Daddy — Search the Seas</title>
<style>
  :root{
    --ink:#0B1B2B; --azure:#1C6EA4; --teal:#2BA8B8; --foam:#F2F7FA;
    --gold:#C9A24B; --sand:#E9DCC3; --coral:#E76F51; --panel:rgba(11,27,43,.82);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:linear-gradient(135deg,#06121e 0%,#0B1B2B 55%,#103a52 100%);color:var(--foam);
    font:600 26px/1.25 Arial,Helvetica,sans-serif;overflow:hidden}
  #wrap{padding:40px 56px;height:100%;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:20px;margin-bottom:28px}
  .logo{width:64px;height:64px;border-radius:50%;background:var(--teal);
    display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 0 4px rgba(201,162,75,.5)}
  h1{font-size:40px;margin:0;letter-spacing:.5px}
  h1 small{display:block;font-size:22px;color:var(--gold);font-weight:600;letter-spacing:2px}
  #bar{display:flex;gap:18px;align-items:center;margin-bottom:26px}
  #q{flex:1;min-height:84px;font:600 34px/1 Arial;padding:0 26px;border-radius:16px;border:3px solid var(--teal);
    background:rgba(0,0,0,.45);color:var(--foam);outline:none}
  #q:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,162,75,.35)}
  #scope{display:flex;gap:12px}
  .chip{min-height:72px;padding:0 26px;border-radius:14px;border:3px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.35);color:var(--foam);font:600 26px/1 Arial;cursor:pointer}
  .chip.on{background:var(--azure);border-color:var(--gold)}
  #status{min-height:36px;color:var(--gold);font-size:24px;margin-bottom:14px}
  #grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:24px;padding-right:10px}
  .card{background:var(--panel);border:2px solid rgba(255,255,255,.18);border-radius:16px;overflow:hidden;
    cursor:pointer;transition:transform .12s ease,border-color .12s ease;display:flex;flex-direction:column}
  .card:focus,.card:hover{transform:translateY(-6px);border-color:var(--gold)}
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#0a1622}
  .card .meta{padding:14px 16px}
  .card .t{font-size:22px;line-height:1.15;max-height:2.3em;overflow:hidden}
  .card .b{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:18px;padding:4px 12px;border-radius:999px;background:rgba(43,168,184,.22);color:var(--teal)}
  .tag.tv{background:rgba(28,110,164,.3);color:#7ec3ff}
  .tag.local{background:rgba(201,162,75,.25);color:var(--gold)}
  #hint{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:rgba(0,0,0,.8);
    border:2px solid var(--gold);border-radius:12px;padding:14px 26px;color:var(--foam);font-size:22px;opacity:0;
    transition:opacity .2s;pointer-events:none}
  #hint.show{opacity:1}
  .empty{padding:60px;text-align:center;color:var(--sand);font-size:28px}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="logo">⚓</div>
    <h1>Search the Seas<small>YACHT DADDY MEDIA</small></h1>
  </header>

    <input id="q" type="search" placeholder="Type a film or show…" autocomplete="off" autofocus>
    <div id="scope">
      <button class="chip on" data-scope="all">All</button>
      <button class="chip" data-scope="movie">Movies</button>
      <button class="chip" data-scope="tv">TV</button>
      <button class="chip" data-scope="local">Local</button>
    </div>
  </div>
  <div id="status">Loading the ship's manifest…</div>
  <div id="grid"></div>
</div>
<div id="hint"></div>

  var index = (SEED_INDEX || []).slice();
  var scope = 'all';
  var grid = document.getElementById('grid');
  var status = document.getElementById('status');
  var q = document.getElementById('q');
  var hint = document.getElementById('hint');

  function hdr(){return {'Accept':'application/json','User-Agent':'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/53.0.2785.116 Safari/537.36'};}
  function showHint(msg){hint.textContent=msg;hint.classList.add('show');setTimeout(function(){hint.classList.remove('show');},2600);}

  function playUrl(action){
    // movie/tv actions are "link:<playerUrl>?tmdb=..." — open the player.
    if(action && action.indexOf('link:')===0){ return action.slice(5); }
    return null;
  }

  function normalize(item, srcKind){
    var title = item.title || item.name || 'Unknown';
    var img = item.image || '';
    var play = playUrl(item.action);
    var kind = srcKind;
    if(srcKind==='local'){ kind='local'; }
    var badge = item.stamp || (srcKind==='tv'?'TV':'');
    return {title:title, img:img, play:play, kind:kind, badge:badge, raw:item};
  }

  async function fetchIndex(){
    // Movies + TV are already inlined (SEED_INDEX). Only Local Media is fetched
    // at runtime — and only best-effort, since the opaque sandbox origin may be
    // blocked by CORS on some hosts. Search works fully without it.
    try {
      var r = await fetch(BASE + '/content/local-media.json?_=' + Date.now(), {headers:hdr()});
      var j = await r.json();
      (j.items||[]).forEach(function(it){ index.push(normalize(it, 'local')); });
    } catch(e){ /* local media optional */ }
    finish(0);
  }

  function finish(errors){
    if(!index.length){
      status.textContent = errors ? 'Could not load content index (check connection).'
                                  : 'No content available to search.';
      return;
    }
    status.textContent = index.length + ' titles aboard — start typing to search.';
    render('');
  }

  function matches(it, term){
    if(scope!=='all' && it.kind!==scope) return false;
    if(!term) return true;
    return it.title.toLowerCase().indexOf(term) !== -1;
  }

  function render(term){
    term = (term||'').toLowerCase().trim();
    var rows = index.filter(function(it){return matches(it, term);});
    if(!term) rows = rows.slice(0,60);
    grid.innerHTML = '';
    if(!rows.length){
      var e=document.createElement('div'); e.className='empty';
      e.textContent = term ? 'Nothing matches “'+term+'”.' : 'No titles in this category.';
      grid.appendChild(e); status.textContent=''; return;
    }
    status.textContent = term
      ? rows.length + ' match' + (rows.length === 1 ? '' : 'es')
      : index.length + ' titles aboard — start typing to search.';
    rows.forEach(function(it){
      var c=document.createElement('div'); c.className='card'; c.tabIndex=0;
      var im=document.createElement('img'); im.loading='lazy'; im.src=it.img||''; im.alt=it.title;
      var meta=document.createElement('div'); meta.className='meta';
      var t=document.createElement('div'); t.className='t'; t.textContent=it.title;
      var b=document.createElement('div'); b.className='b';
      var tag=document.createElement('span'); tag.className='tag '+it.kind;
      tag.textContent = it.kind==='tv'?'TV':it.kind==='local'?'LOCAL':'MOVIE';
      b.appendChild(tag);
      if(it.badge){var bg=document.createElement('span');bg.className='tag';bg.textContent=it.badge;b.appendChild(bg);}
      meta.appendChild(t); meta.appendChild(b);
      c.appendChild(im); c.appendChild(meta);
      function act(){
        var url = playUrl(it.play);
        if(url){ window.location.href = url; }
        else if(it.kind==='local'){ showHint('Open “Local Media” from the main menu to play this file.'); }
        else { showHint('No playable source for this title.'); }
      }
      c.addEventListener('click', act);
      c.addEventListener('keydown', function(ev){ if(ev.key==='Enter') act(); });
      grid.appendChild(c);
    });
  }

  q.addEventListener('input', function(){ render(q.value); });
  q.addEventListener('search', function(){ render(q.value); });
  document.querySelectorAll('.chip').forEach(function(ch){
    ch.addEventListener('click', function(){
      document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});
      ch.classList.add('on'); scope = ch.getAttribute('data-scope'); render(q.value);
    });
  });
  document.addEventListener('keydown', function(ev){
    if(ev.key==='/' && document.activeElement!==q){ ev.preventDefault(); q.focus(); }
  });

  fetchIndex();
})();
